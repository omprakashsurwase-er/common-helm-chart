{{- /*
Namespace template (safe + production-ready)
*/ -}}

{{- if and .Release.Namespace .Values.namespace.create }}

apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace | default "default" }}

  labels:
    {{- include "common-helm-chart.labels" . | nindent 4 }}
    {{- with .Release.Namespace.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

  {{- with .Release.Namespace.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

{{- end }}
