{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "common-helm-chart.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "common-helm-chart.labels" . | nindent 4 }}
    {{- with .Values.rbac.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.rbac.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "common-helm-chart.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "common-helm-chart.serviceAccountName" . }}
    namespace: {{ .Values.namespace.name }}
{{- end }}