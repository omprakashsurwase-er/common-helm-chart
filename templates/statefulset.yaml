{{- $workload := .Values.workload | default (dict "type" "deployment") -}}
{{- if eq (default "deployment" $workload.type) "statefulset" }}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "common-helm-chart.fullname" . }}
  namespace: {{ .Values.namespace | default "default" }}
  labels:
    {{- include "common-helm-chart.labels" . | nindent 4 }}

spec:
  serviceName: {{ include "common-helm-chart.fullname" . }}

  replicas: {{ .Values.replicaCount | default 1 }}

  selector:
    matchLabels:
      app: {{ include "common-helm-chart.name" . }}
      release: {{ .Release.Name }}

  template:
    metadata:
      labels:
        app: {{ include "common-helm-chart.name" . }}
        release: {{ .Release.Name }}

    spec:
      {{- if .Values.serviceAccount.create | default false }}
      serviceAccountName: {{ include "common-helm-chart.serviceAccountName" . }}
      {{- end }}

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository | default "nginx" }}:{{ .Values.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}

          ports:
            {{- range .Values.containerPorts | default list }}
            - name: {{ .name }}
              containerPort: {{ .containerPort }}
              protocol: {{ .protocol | default "TCP" }}
            {{- end }}

          {{- if .Values.livenessProbe.enabled | default false }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: 80
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          {{- end }}

          {{- if .Values.readinessProbe.enabled | default false }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: 80
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          {{- end }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          env:
            {{- range .Values.env | default list }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}

{{- end }}
