# =========================
# COMMON HELM CHART VALUES
# FIXED NIL POINTER SAFE VERSION
# =========================

namespace:
  create: false
  name: default

# -------------------------
# Workload
# -------------------------
workload:
  type: Deployment

replicaCount: 1

# -------------------------
# Image
# -------------------------
image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# -------------------------
# SERVICE ACCOUNT
# -------------------------
serviceAccount:
  create: true
  name: ""

# -------------------------
# RBAC (CRITICAL FIX)
# -------------------------
rbac:
  create: true
  rules: []
  roleRules: []

role:
  create: true
  rules: []

roleBinding:
  create: true

clusterRole:
  create: true
  rules: []

clusterRoleBinding:
  create: true

# -------------------------
# SECURITY CONTEXT
# -------------------------
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  fsGroup: 0

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# -------------------------
# CONTAINER
# -------------------------
containerPorts:
  - name: http
    containerPort: 8080
    protocol: TCP

# -------------------------
# PROBES
# -------------------------
livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5

startupProbe: {}

# -------------------------
# RESOURCES
# -------------------------
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# -------------------------
# ENVIRONMENT
# -------------------------
env: []
envFrom: []

# -------------------------
# VOLUMES (NGINX FIX)
# -------------------------
volumeMounts:
  - name: nginx-cache
    mountPath: /var/cache/nginx

volumes:
  - name: nginx-cache
    emptyDir: {}

# -------------------------
# SERVICE
# -------------------------
service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 8080
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP

# -------------------------
# INGRESS
# -------------------------
ingress:
  enabled: false

# -------------------------
# AUTOSCALING
# -------------------------
autoscaling:
  enabled: false

# -------------------------
# NETWORK POLICY
# -------------------------
networkPolicy:
  enabled: false

# -------------------------
# SCHEDULING
# -------------------------
nodeSelector: {}
affinity: {}
tolerations: []

terminationGracePeriodSeconds: 30

# -------------------------
# CONFIG / SECRET
# -------------------------
configMap:
  enabled: true
  data: {}

secret:
  enabled: true
  stringData: {}
