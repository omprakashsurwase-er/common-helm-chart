namespace:
  create: false
  name: default

workload:
  type: Deployment

replicaCount: 1

image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

rbac:
  create: true
  rules: []
  roleRules: []

role:
  create: true
  rules: []

roleBinding:
  create: true

clusterRole:
  create: true
  rules: []

clusterRoleBinding:
  create: true

podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  fsGroup: 0

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

containerPorts:
  - name: http
    containerPort: 8080

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

volumeMounts:
  - name: nginx-cache
    mountPath: /var/cache/nginx

volumes:
  - name: nginx-cache
    emptyDir: {}

service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 8080
  ports:
    - name: http
      port: 80
      targetPort: 8080

ingress:
  enabled: false

autoscaling:
  enabled: false

networkPolicy:
  enabled: false

nodeSelector: {}
affinity: {}
tolerations: []

terminationGracePeriodSeconds: 30

configMap:
  enabled: true
  data: {}

secret:
  enabled: true
  stringData: {}
