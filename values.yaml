# =========================
# Common Helm Chart Values
# Production Ready (Fixed)
# =========================

namespace:
  create: false
  name: default

# -------------------------
# Workload
# -------------------------
workload:
  type: Deployment

replicaCount: 1

# -------------------------
# Image
# -------------------------
image:
  repository: nginx
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# -------------------------
# Name overrides
# -------------------------
nameOverride: ""
fullnameOverride: ""

# -------------------------
# Service Account
# -------------------------
serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: true

# -------------------------
# Security Context (FIXED for nginx)
# -------------------------
podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  fsGroup: 0

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# -------------------------
# Container Ports (IMPORTANT)
# -------------------------
containerPorts:
  - name: http
    containerPort: 8080
    protocol: TCP

# -------------------------
# Probes (FIXED PORT ALIGNMENT)
# -------------------------
livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5

startupProbe: {}

# -------------------------
# Resources
# -------------------------
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# -------------------------
# Environment
# -------------------------
env: []
envFrom: []

# -------------------------
# Volumes (FIXED NGINX CRASH ISSUE)
# -------------------------
volumeMounts:
  - name: nginx-cache
    mountPath: /var/cache/nginx

volumes:
  - name: nginx-cache
    emptyDir: {}

# -------------------------
# Service (FIXED PORT MAPPING)
# -------------------------
service:
  enabled: true
  type: ClusterIP
  port: 80
  targetPort: 8080
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP

# -------------------------
# Ingress (disabled)
# -------------------------
ingress:
  enabled: false

# -------------------------
# Autoscaling
# -------------------------
autoscaling:
  enabled: false

# -------------------------
# Pod Disruption Budget
# -------------------------
podDisruptionBudget:
  enabled: false

# -------------------------
# Network Policy
# -------------------------
networkPolicy:
  enabled: false

# -------------------------
# Node Scheduling
# -------------------------
affinity: {}
nodeSelector: {}
tolerations: []

# -------------------------
# Lifecycle
# -------------------------
terminationGracePeriodSeconds: 30

# -------------------------
# ConfigMap / Secret
# -------------------------
configMap:
  enabled: true
  data: {}

secret:
  enabled: true
  stringData: {}
