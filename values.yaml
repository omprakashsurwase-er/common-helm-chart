replicaCount: 2

image:
  repository: nginx
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  normal:
    APP_ENV: production

configMap:
  enabled: true
  data:
    LOG_LEVEL: INFO

secret:
  enabled: true
  data:
    username: admin
    password: password123

livenessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 10
  periodSeconds: 5

nodeSelector: {}

tolerations: []

affinity: {}

persistence:
  enabled: false
  storageClass: gp2
  accessMode: ReadWriteOnce
  size: 5Gi

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false

rollingUpdate:
  maxUnavailable: 1
  maxSurge: 1

initContainers: []

sidecars: []

volumeMounts: []

volumes: []
